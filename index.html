<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DELIPOD</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231b1c19'/%3E%3Ctext x='32' y='33' font-family='Space Grotesk,Arial,sans-serif' font-size='42' font-weight='700' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'%3ED%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#e9e9e6;
  --sheet:#fafaf8;
  --ink:#23241f;
  --line:#2b2b28;
  --line-soft:#c9c9c4;
  --muted:#8d8d86;
  --grey-fill:#dededa;
  --grey-fill-2:#ececeaff;
  --accent:#16786a;          /* accent vert par défaut */
  --accent-ink:#ffffff;
  --display:'Helvetica Neue', Arial, 'Liberation Sans', sans-serif;   /* net mode default — neutre */
  --hand:'Kalam', cursive;
  --ui:'Helvetica Neue', Arial, 'Liberation Sans', sans-serif;
  --mono:'Space Mono', monospace;
  --pad-sec:84px;            /* aéré */
  --gap:28px;
  --maxw:1400px;
}
/* density */
[data-density="compact"]{ --pad-sec:52px; --gap:18px; }
/* titles mode: croquis = hand-drawn headings */
[data-titles="croquis"]{ --display:'Kalam', cursive; }
/* accent none */
[data-accent="none"]{ --accent:#23241f; }
[data-accent="green"]{ --accent:#16786a; }
[data-accent="blue"]{ --accent:#2f5fd0; }
[data-accent="orange"]{ --accent:#c4602a; }
[data-accent="teal"]{ --accent:#1f7a6b; }

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  background:var(--paper);
  background-image:radial-gradient(var(--line-soft) 0.7px, transparent 0.7px);
  background-size:22px 22px;
  color:var(--ink);
  font-family:var(--ui);
  -webkit-font-smoothing:antialiased;
}
a{ color:inherit; }
button{ font-family:inherit; cursor:pointer; }

/* ---------- TOOL CHROME ---------- */
.chrome{
  position:sticky; top:0; z-index:50;
  background:#1b1c19; color:#f3f3ee;
  border-bottom:1px solid #000;
}
.chrome-row{
  max-width:1380px; margin:0 auto; padding:0 18px;
  height:54px; display:flex; align-items:center; gap:18px;
}
.brandchip{ display:flex; align-items:center; gap:10px; }
.brandchip .mark{
  font-family:var(--ui); font-weight:700; letter-spacing:.22em;
  font-size:15px; background:transparent; color:#fff; padding:5px 2px; border-radius:2px;
}
.brandchip .sub{ font-family:var(--mono); font-size:11px; color:#9a9a93; letter-spacing:.04em; }
.tabs{ display:flex; gap:4px; margin-left:6px; }
.tab{
  background:transparent; color:#cfcfc8; border:0; padding:8px 14px; border-radius:3px;
  font-size:13.5px; font-weight:500; letter-spacing:.01em; position:relative;
}
.tab:hover{ color:#fff; background:#2a2b27; }
.tab[aria-selected="true"]{ color:#fff; }
.tab[aria-selected="true"]::after{
  content:""; position:absolute; left:12px; right:12px; bottom:2px; height:2px; background:var(--accent); border-radius:2px;
}
.chrome-right{ margin-left:auto; display:flex; align-items:center; gap:10px; }
.langtog{ display:flex; border:1px solid #3a3b36; border-radius:4px; overflow:hidden; }
.langtog button{ background:transparent; color:#cfcfc8; border:0; padding:6px 11px; font-size:12px; font-weight:600; letter-spacing:.05em; }
.langtog button[aria-pressed="true"]{ background:var(--accent); color:var(--accent-ink); }
.gear{
  background:#2a2b27; color:#f3f3ee; border:1px solid #3a3b36; border-radius:4px;
  padding:6px 12px; font-size:12px; font-weight:600; display:flex; align-items:center; gap:7px;
}
.gear:hover{ background:#34352f; }

/* sub bar (direction toggle) */
.subbar{
  position:sticky; top:54px; z-index:40;
  background:#f3f3ef; border-bottom:1px solid var(--line-soft);
}
.subbar-row{ max-width:1380px; margin:0 auto; padding:0 18px; height:46px; display:flex; align-items:center; gap:14px; }
.subbar .lbl{ font-family:var(--mono); font-size:11px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; }
.dirtog{ display:flex; gap:6px; }
.dirbtn{
  background:#fff; border:1.5px solid var(--line); color:var(--ink);
  padding:7px 14px; border-radius:4px; font-size:12.5px; font-weight:600;
  box-shadow:2px 2px 0 rgba(0,0,0,.05); display:flex; align-items:center; gap:8px;
}
.dirbtn .num{ font-family:var(--mono); font-size:11px; color:var(--muted); }
.dirbtn[aria-pressed="true"]{ background:var(--ink); color:#fff; }
.dirbtn[aria-pressed="true"] .num{ color:#bdbdb6; }

/* ---------- ARTBOARD ---------- */
.stage{ padding:30px 18px 90px; }
.sheet{
  max-width:var(--maxw); margin:0 auto; background:var(--sheet);
  border:1.5px solid var(--line); border-radius:4px;
  box-shadow:0 1px 0 rgba(0,0,0,.04), 8px 10px 0 rgba(0,0,0,.05);
  overflow:clip;
}
.sheet-cap{
  font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.1em;
  max-width:var(--maxw); margin:0 auto 10px; display:flex; justify-content:space-between; text-transform:uppercase;
}

/* ---------- WIREFRAME PRIMITIVES ---------- */
.wsec{ padding:var(--pad-sec) 64px; border-bottom:1px dashed var(--line-soft); }
.wsec:last-child{ border-bottom:0; }
.wsec.tight{ padding-top:calc(var(--pad-sec) * .5); padding-bottom:calc(var(--pad-sec) * .5); }
.wsec.fill{ background:var(--grey-fill-2); }
.wsec.ink{ background:#1f201c; color:#f1f1ec; border-bottom-color:#34352f; }
.wsec.ink .kicker{ color:#b6b6ad; }
.wsec.ink .lines span{ background:#43443d; }

.kicker{ font-family:var(--mono); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:10px; margin:0 0 18px; }
.kicker b{ color:var(--accent); font-weight:700; }
h1.wt,h2.wt,h3.wt{ font-family:var(--display); font-weight:700; line-height:1.04; margin:0; letter-spacing:-.01em; }
[data-titles="croquis"] h1.wt,[data-titles="croquis"] h2.wt,[data-titles="croquis"] h3.wt{ letter-spacing:0; line-height:1.08; }
h1.wt{ font-size:54px; }
h2.wt{ font-size:36px; }
h3.wt{ font-size:21px; }
.lead{ font-size:18px; color:#54544e; max-width:54ch; line-height:1.5; }

/* greeked text */
.lines{ display:flex; flex-direction:column; gap:9px; }
.lines span{ height:9px; background:var(--grey-fill); border-radius:3px; display:block; }

/* image / product placeholder */
.slot{
  position:relative; border:1.5px solid var(--line); border-radius:3px; overflow:hidden;
  background:
    repeating-linear-gradient(45deg, #e4e4df 0 11px, #ededea 11px 22px);
  display:flex; align-items:center; justify-content:center; color:#73736c;
}
.slot::after{ content:attr(data-label); font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-align:center; padding:0 14px; }
.slot.real{ background:#dddbd6; }
.slot.real::after{ content:none; }
.slot img{ width:100%; height:100%; object-fit:cover; display:block; }
.slot .dim{ position:absolute; left:8px; bottom:7px; font-family:var(--mono); font-size:10px; color:#8a8a82; background:rgba(255,255,255,.7); padding:1px 6px; border-radius:2px; }

/* buttons */
.wbtn{ display:inline-flex; align-items:center; gap:9px; border-radius:5px; font-weight:600; font-size:14px; padding:13px 22px; border:1.5px solid var(--line); background:#fff; color:var(--ink); box-shadow:2px 2px 0 rgba(0,0,0,.08); text-decoration:none; }
.wbtn.primary{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }
.wbtn .arr{ font-family:var(--mono); }

/* annotation note */
.note{ font-family:var(--hand); color:var(--accent); font-size:16px; line-height:1.2; display:inline-flex; align-items:center; gap:6px; }
.note.grey{ color:#9a9a92; }

/* generic grid helpers */
.row{ display:flex; gap:var(--gap); }
.col{ display:flex; flex-direction:column; gap:var(--gap); }
.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:var(--gap); }
.grid3{ display:grid; grid-template-columns:repeat(3,1fr); gap:var(--gap); }
.grid4{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.card{ border:1.5px solid var(--line); border-radius:4px; background:#fff; padding:22px; box-shadow:3px 3px 0 rgba(0,0,0,.05); }
.icon{ width:34px; height:34px; border:1.5px solid var(--line); border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:13px; color:var(--muted); }

/* spec table */
.spec{ width:100%; border-collapse:collapse; }
.spec td{ border-bottom:1px dashed var(--line-soft); padding:13px 4px; font-size:14.5px; }
.spec td:first-child{ color:var(--muted); width:42%; font-family:var(--mono); font-size:12.5px; letter-spacing:.04em; text-transform:uppercase; }
.spec td:last-child{ color:#54544e; }

/* footer */
.wfoot{ background:#1b1c19; color:#cfcfc8; padding:42px 64px; }
.wfoot .mark{ font-family:var(--ui); font-weight:700; letter-spacing:.22em; color:#fff; }

/* about timeline (horizontal) */
.timeline{ display:grid; grid-template-columns:repeat(5,1fr); gap:24px; }
.tl-step{ position:relative; padding-top:30px; }
.tl-dot{ position:absolute; top:0; left:0; width:14px; height:14px; border-radius:50%; background:var(--accent); border:3px solid var(--sheet); box-shadow:0 0 0 1.5px var(--accent); }
.tl-bar{ position:absolute; top:6px; left:14px; right:-24px; height:1.5px; background:var(--line-soft); }
.hero-img-el{ transform:scale(1.6); }
@media (max-width:780px){
  .timeline{ grid-template-columns:1fr; }
  .tl-bar{ display:none; }
}

/* form field */
.field{ display:flex; flex-direction:column; gap:7px; }
.field label{ font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
.field .inp{ height:44px; border:1.5px solid var(--line); border-radius:4px; background:#fff; }
.field .inp.area{ height:120px; }

/* tweaks drawer */
.scrim{ position:fixed; inset:0; background:rgba(0,0,0,.28); z-index:60; }
.drawer{
  position:fixed; top:0; right:0; bottom:0; width:320px; z-index:61;
  background:#fafaf8; border-left:1.5px solid var(--line); box-shadow:-8px 0 24px rgba(0,0,0,.12);
  display:flex; flex-direction:column;
}
.drawer h4{ margin:0; font-family:var(--display); font-size:16px; }
.drawer-hd{ padding:18px 20px; border-bottom:1.5px solid var(--line-soft); display:flex; align-items:center; justify-content:space-between; }
.drawer-bd{ padding:8px 20px 24px; overflow:auto; }
.twk{ padding:18px 0; border-bottom:1px dashed var(--line-soft); }
.twk .tlbl{ font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:11px; }
.seg{ display:flex; gap:6px; flex-wrap:wrap; }
.seg button{ background:#fff; border:1.5px solid var(--line); border-radius:5px; padding:8px 12px; font-size:12.5px; font-weight:600; color:var(--ink); }
.seg button[aria-pressed="true"]{ background:var(--ink); color:#fff; }
.swatches{ display:flex; gap:8px; }
.sw{ width:30px; height:30px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1.5px var(--line); cursor:pointer; }
.sw[aria-pressed="true"]{ box-shadow:0 0 0 1.5px var(--line), 0 0 0 4px rgba(0,0,0,.18); }
.xbtn{ background:transparent; border:0; font-size:18px; color:var(--muted); }

/* ============ RESPONSIVE ============ */
/* tablet */
@media (max-width:1024px){
  .wsec{ padding:var(--pad-sec) 40px; }
  h1.wt{ font-size:44px; }
}
/* phone */
@media (max-width:780px){
  .grid2,.grid3,.grid4{ grid-template-columns:1fr !important; gap:26px !important; }
  .wsec{ padding:44px 22px; }
  h1.wt{ font-size:32px; }
  h2.wt{ font-size:26px; }
  .lead{ font-size:16px; }
  .stage{ padding:14px 10px 60px; }
  .sheet{ border-radius:0; box-shadow:none; }

  /* working top nav: logo + scrollable tabs + lang, gear hidden */
  .chrome-row{ gap:8px; padding:0 12px; }
  .tabs{ display:flex !important; margin-left:0; flex:1 1 auto; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{ padding:8px 9px; font-size:12.5px; white-space:nowrap; }
  .brandchip .mark{ font-size:13px; letter-spacing:.14em; }
  .gear{ display:none; }
  .langtog button{ padding:6px 8px; }

  /* in-page section nav */
  .subnav-row{ padding:0 16px !important; }

  /* event bar: icon + text on first line, register button on its own line below */
  .eventbar-row{ flex-wrap:wrap !important; padding:10px 14px !important; gap:10px !important; align-items:flex-start !important; }
  .eventbar-row > span:first-child{ order:0; }
  .eventbar-row p{ flex:1 1 0 !important; order:1; font-size:13px !important; }
  .eventbar-row button{ order:2; }
  .eventbar-row a{ order:3; flex:1 1 100% !important; justify-content:center; }

  /* hero: stats stay 3-col, ordered before the CTA, image last */
  .hero-text{ display:flex; flex-direction:column; }
  .hero-stats{ grid-template-columns:repeat(3,1fr) !important; gap:0 !important; order:1; }
  .hero-stats .wt{ font-size:16px !important; }
  .hero-cta{ order:2; margin-top:20px !important; }
  .hero-img{ min-height:0 !important; margin:0 -18px !important; overflow:hidden !important; }
  .hero-img .hero-img-el{ transform:scale(1.65) !important; margin-left:-13% !important; max-height:300px !important; padding:0 !important; }
  .hero-img{ max-height:280px !important; align-items:flex-start !important; }

  /* partners in 2 columns */
  .partners-grid{ grid-template-columns:1fr 1fr !important; gap:18px !important; }

  /* genèse: text first, image below full-width */
  .genese-block{ display:flex; flex-direction:column; }
  .genese-photo{ float:none !important; width:100% !important; max-width:100% !important; height:240px !important; margin:18px 0 0 0 !important; order:2; }

  /* timeline → single column */
  .timeline{ grid-template-columns:1fr; gap:18px; }
  .tl-bar{ display:none; }

  /* Fresh block: drop fixed heights, let content stack naturally */
  .fresh-grid{ gap:24px !important; }
  .fresh-col{ min-height:0 !important; gap:18px; }
  .fresh-photo .slot{ height:430px !important; }
  .std-photo{ height:430px !important; }
}
/* small phone */
@media (max-width:430px){
  .wsec{ padding:36px 16px; }
  h1.wt{ font-size:28px; }
  .tab{ font-size:12px; padding:8px 7px; }
}
</style>

<body>
<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />
  <input type="text" name="company" />
  <input type="email" name="email" />
  <input type="text" name="subject" />
  <textarea name="message"></textarea>
</form>
<div id="root"></div>
